
<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,'sans-serif');background:var(--color-background-tertiary,#f5f5f5);padding:10px;border-radius:12px;overflow-x:hidden}
h1{font-size:19px;font-weight:600;text-align:center;color:var(--color-text-primary,#111);margin-bottom:2px}
.sub{font-size:11px;color:var(--color-text-secondary,#888);text-align:center;margin-bottom:8px}
#finger-overlay{position:fixed;pointer-events:none;z-index:99999;display:none}
.game-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,30,40,.88);color:#fff;padding:10px 22px;border-radius:24px;font-size:14px;font-weight:700;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:9999;white-space:nowrap;}
.game-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#finger-svg{width:52px;height:62px;filter:drop-shadow(1px 3px 4px rgba(0,0,0,.38));transform-origin:12px 8px}
#finger-bubble{position:absolute;top:-44px;left:32px;background:#fff;border:3px solid #F5A623;border-radius:14px;padding:8px 16px;font-size:18px;font-weight:900;color:#F5A623;white-space:nowrap;opacity:0;pointer-events:none;box-shadow:0 3px 12px rgba(0,0,0,.22)}
#finger-bubble::after{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);border:5px solid transparent;border-right-color:#F5A623}
#finger-bubble.show{animation:bubblePop .3s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes bubblePop{0%{opacity:0;transform:scale(.6)}100%{opacity:1;transform:scale(1)}}
@keyframes fingerWobble{0%,100%{transform:rotate(0deg) scale(1)}20%{transform:rotate(-8deg) scale(1.05)}40%{transform:rotate(5deg) scale(.98)}60%{transform:rotate(-5deg) scale(1.03)}80%{transform:rotate(3deg) scale(.99)}}

/* SETUP */
.setup{max-width:560px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:0;background:linear-gradient(160deg,#fff8f0 0%,#fff 60%,#f0f4ff 100%);border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.10);box-sizing:border-box;}
.sc{background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-tertiary,#e0e0e0);border-radius:10px;padding:10px 13px}
.sc h3{font-size:12px;font-weight:600;margin-bottom:8px;color:var(--color-text-primary,#111)}
.sc p{font-size:11px;color:var(--color-text-secondary,#888);line-height:1.5}
.sc p strong{color:var(--color-text-primary,#111);font-weight:600}
.btn{border:0.5px solid var(--color-border-secondary,#ccc);background:transparent;border-radius:8px;padding:6px 13px;font-size:12px;cursor:pointer;color:var(--color-text-primary,#111);transition:background .1s}
.btn:hover{background:var(--color-background-secondary,#f0f0f0)}
.btn-p{background:#F5A623;color:#fff;border-color:#e09510;font-weight:600}.btn-p:hover{background:#e09510}
.select-cards{display:flex;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.sel-card{flex:1;min-width:90px;border:2.5px solid #e8e8e8;border-radius:14px;padding:14px 8px 12px;text-align:center;cursor:pointer;transition:all .18s cubic-bezier(.34,1.56,.64,1);background:#fff;user-select:none;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.sel-card:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 8px 20px rgba(0,0,0,.13);}
.sel-card .sc-icon{font-size:28px;margin-bottom:6px;line-height:1;display:block;}
.sel-card .sc-title{font-size:13px;font-weight:800;margin-bottom:4px;color:#222;}
.sel-card .sc-desc{font-size:10px;color:#888;line-height:1.5;}
.sel-easy{--c:#27ae60}.sel-easy.chosen{border-color:#27ae60;background:linear-gradient(135deg,#e8f8f0,#f0fff8);box-shadow:0 0 0 3px #27ae6044,0 6px 18px #27ae6022;}
.sel-normal{--c:#2980b9}.sel-normal.chosen{border-color:#2980b9;background:linear-gradient(135deg,#e3f0fd,#f0f8ff);box-shadow:0 0 0 3px #2980b944,0 6px 18px #2980b922;}
.sel-hard{--c:#e74c3c}.sel-hard.chosen{border-color:#e74c3c;background:linear-gradient(135deg,#fdecea,#fff5f5);box-shadow:0 0 0 3px #e74c3c44,0 6px 18px #e74c3c22;}
.sel-p1{--c:#9b59b6}.sel-p1.chosen{border-color:#9b59b6;background:#f5eeff;box-shadow:0 0 0 3px #9b59b6}
.sel-p2{--c:#e67e22}.sel-p2.chosen{border-color:#e67e22;background:#fef5e7;box-shadow:0 0 0 3px #e67e22}
.sel-p3{--c:#27ae60}.sel-p3.chosen{border-color:#27ae60;background:#e8f8f0;box-shadow:0 0 0 3px #27ae60}
.sel-p4{--c:#2980b9}.sel-p4.chosen{border-color:#2980b9;background:#e3f0fd;box-shadow:0 0 0 3px #2980b9}
.sel-card.chosen .sc-title{color:var(--c);}.sel-card.chosen .sc-icon{filter:drop-shadow(0 2px 4px rgba(0,0,0,.18));transform:scale(1.1);display:inline-block;}
.banner{border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;margin-bottom:7px;text-align:center;color:#fff}
.banner-easy{background:#27ae60}.banner-normal{background:#2980b9}.banner-hard{background:#e74c3c}

/* 質問カードエリア見出し */
.qcard-section-title{font-family:'Hiragino Maru Gothic Pro','HG丸ゴシックM-PRO','Rounded Mplus 1c','Comic Sans MS',sans-serif;font-size:12px;font-weight:700;color:#8e44ad;letter-spacing:1px;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
/* 質問カード */
.qcard-area{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.qcard-wrap{perspective:600px}
.qcard-inner{position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1)}
.qcard-inner.flipped{transform:rotateY(180deg)}
.qcard-front,.qcard-back{position:absolute;inset:0;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;backface-visibility:hidden;-webkit-backface-visibility:hidden;border:2px solid transparent;padding:4px;line-height:1.3}
.qcard-back{background:linear-gradient(135deg,#ff8c00,#e85d00);border-color:#1a5276;color:#fff;font-size:13px;transition:filter .15s,transform .15s}
.qcard-back:hover:not(.used){filter:brightness(1.2);transform:scale(1.07)}
.qcard-back.used{background:#bbb;border-color:#999}
.qcard-front{background:#eaf4ff;border-color:#90c0e8;color:#185fa5;transform:rotateY(180deg);font-weight:600}
.qcard-back .qnum{position:absolute;top:3px;left:5px;font-weight:700;color:rgba(255,255,255,.6)}
.qcard-back .qpts{position:absolute;top:3px;right:5px;font-weight:700;color:#f1c40f}

/* 方位 */
.dir-label{width:28px;height:28px;flex-shrink:0;background:#e74c3c;color:#fff;border-radius:6px;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(231,76,60,.4)}
.board-compass-wrap{display:inline-flex;flex-direction:column;align-items:stretch;flex-shrink:0}
.compass-row-top{display:flex;justify-content:center;margin-bottom:4px}
.compass-row-mid{display:flex;align-items:stretch;gap:4px}
.dir-side{display:flex;align-items:center;justify-content:center;width:28px}
.compass-row-bot{display:flex;justify-content:center;margin-top:4px}

/* 会話ポップアップ */
.conv-popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.75);opacity:0;pointer-events:none;transition:transform .2s cubic-bezier(.34,1.56,.64,1),opacity .15s;z-index:20;display:flex;flex-direction:column;gap:0;min-width:240px;max-width:290px}
.conv-popup.show{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:auto}
.conv-q{background:#fff;border:2.5px solid #2980b9;border-radius:14px;overflow:hidden;box-shadow:0 3px 14px rgba(41,128,185,.28);animation:slideIn .2s ease-out}
.conv-q-text{padding:12px 16px 10px;font-size:14px;font-weight:700;color:#1a4a7a;line-height:1.5}
.conv-q-pts{padding:0 16px 6px;font-size:10px;color:#888}
.conv-q-btn{border-top:2px solid #2980b9;background:#2980b9;color:#fff;font-size:13px;font-weight:700;padding:9px 0;text-align:center;cursor:pointer;user-select:none;transition:background .12s;letter-spacing:.5px}
.conv-q-btn:hover{background:#1f6da8}
.conv-a{background:#fff;border:2.5px solid #e74c3c;border-radius:14px;overflow:hidden;box-shadow:0 3px 14px rgba(231,76,60,.25);animation:slideIn .2s ease-out .08s both;margin-top:8px}
.conv-a-text{padding:12px 16px 10px;font-size:14px;font-weight:700;color:#922b21;line-height:1.5}
.conv-a-btn{border-top:2px solid #e74c3c;background:#e74c3c;color:#fff;font-size:13px;font-weight:700;padding:9px 0;text-align:center;cursor:pointer;user-select:none;transition:background .12s;letter-spacing:.5px}
.conv-a-btn:hover{background:#c0392b}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.conv-result{background:var(--color-background-primary,#fff);border-radius:14px;padding:16px 18px;text-align:center;box-shadow:0 6px 24px rgba(0,0,0,.22);animation:slideIn .2s ease-out}
.conv-result .res-icon{font-size:32px;margin-bottom:6px;line-height:1}
.conv-result .res-title{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--color-text-primary,#111)}
.conv-result .res-body{font-size:12px;color:var(--color-text-secondary,#888);line-height:1.6;margin-bottom:12px}
.conv-result .res-body strong{color:var(--color-text-primary,#111);font-weight:700}
.board-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.38);border-radius:8px;z-index:10;display:none;pointer-events:none}
.board-backdrop.show{display:block}

/* ゲームレイアウト */
.glayout{display:flex;gap:10px;align-items:flex-start}
.board-area{position:relative}
.board{display:grid;gap:3px}
.oc{border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:4px;position:relative;user-select:none;transition:transform .12s,box-shadow .12s;border:2px solid transparent;overflow:hidden}
.oc .card-img{position:absolute;top:2px;left:0;right:0;display:flex;align-items:center;justify-content:center}
.oc .card-img svg{width:auto;height:100%}
.oc .ot{font-weight:800;text-align:center;line-height:1.2;position:relative;z-index:1;letter-spacing:-.3px;text-shadow:-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff,1px 1px 0 #fff,0 0 4px #fff}
.oc .oa{font-weight:700;margin-top:1px;position:relative;z-index:1;padding:1px 4px;border-radius:3px}
.oc.col-red{background:#fff;border:3px solid #e53935;color:#7f1f1f}
.oc.col-blue{background:#fff;border:3px solid #1565c0;color:#0d3b6e}
.oc.col-yellow{background:#fff;border:3px solid #f9a825;color:#7a5a00}
.oc.col-green{background:#fff;border:3px solid #2e7d32;color:#1a4d1a}
.oc.col-red.old-card{background:#f0f0f0}
.oc.col-blue.old-card{background:#f0f0f0}
.oc.col-yellow.old-card{background:#f0f0f0}
.oc.col-green.old-card{background:#f0f0f0}
.oc.col-red .oa{background:#e53935;color:#fff}
.oc.col-blue .oa{background:#1565c0;color:#fff}
.oc.col-yellow .oa{background:#f9a825;color:#7a5a00}
.oc.col-green .oa{background:#2e7d32;color:#fff}
.oc.sta-card{background:linear-gradient(160deg,#fff3e0 0%,#ffcc80 60%,#ffa726 100%);border:4px solid #ffa726;box-shadow:0 0 0 3px #ffcc80,0 0 16px 4px rgba(255,167,38,.4);cursor:default;animation:staPulse 2s ease-in-out infinite}
.oc.sta-card:hover{transform:none}
@keyframes staPulse{0%,100%{box-shadow:0 0 0 3px #ffcc80,0 0 12px 3px rgba(255,167,38,.3)}50%{box-shadow:0 0 0 5px #ffe082,0 0 20px 6px rgba(255,167,38,.5)}}
.oc.found{background:#d4f5e2!important;border-color:#27ae60!important;color:#0a4a28!important}
.oc.found .oa{background:#27ae60!important;color:#fff!important}
.oc.miss{opacity:.28;border-style:dashed!important;pointer-events:none}
.oc.hovering-card{box-shadow:0 0 0 3px #F5A623,0 2px 10px rgba(0,0,0,.18)!important;transform:scale(1.07);z-index:2}
.oc .result-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.55);border-radius:5px;z-index:3}

/* ── サイドパネル（おしゃれ版） ── */
.side{width:200px;flex-shrink:0;display:flex;flex-direction:column;gap:8px}


/* あなたの番カード */
.turn-card{
  border-radius:12px;overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}
.turn-card-header{
  padding:8px 12px 6px;
  font-size:11px;font-weight:700;letter-spacing:.5px;color:#fff;
  display:flex;align-items:center;gap:5px;
}
.turn-card-body{
  background:var(--color-background-primary,#fff);
  padding:9px 12px 10px;
  font-size:12px;line-height:1.5;color:var(--color-text-primary,#111);
  font-weight:500;
}

/* スコアカード */
.score-card{
  background:var(--color-background-primary,#fff);
  border-radius:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  overflow:hidden;
}
.score-card-header{
  padding:7px 12px;
  font-size:11px;font-weight:700;letter-spacing:.5px;
  color:#fff;background:linear-gradient(90deg,#2c3e50,#34495e);
  display:flex;align-items:center;gap:5px;
}
.score-row{
  display:flex;align-items:center;padding:7px 12px;
  border-bottom:1px solid var(--color-border-tertiary,#f0f0f0);
  gap:6px;
}
.score-row:last-child{border-bottom:none}
.score-row.current-player{background:#fffbf0}
.score-avatar{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;flex-shrink:0;
}
.score-name{font-size:11px;font-weight:600;color:var(--color-text-primary,#111);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.score-badge{font-size:8px;padding:1px 4px;border-radius:3px;margin-left:2px;vertical-align:middle}
.score-pts{font-size:13px;font-weight:700;color:var(--color-text-primary,#111);margin-left:auto}
.cur-arrow{font-size:10px;color:#F5A623;flex-shrink:0}

/* ログカード */
.log-card{
  background:var(--color-background-primary,#fff);
  border-radius:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  overflow:hidden;
  flex:1;
}
.log-card-header{
  padding:7px 12px;
  font-size:11px;font-weight:700;letter-spacing:.5px;
  color:#fff;background:linear-gradient(90deg,#6c3483,#7d3c98);
  display:flex;align-items:center;gap:5px;
}
.log-list{
  padding:6px 0;
  max-height:220px;overflow-y:auto;
}
.log-item{
  padding:5px 12px;
  border-bottom:1px solid var(--color-border-tertiary,#f0f0f0);
  display:flex;gap:6px;align-items:flex-start;
}
.log-item:last-child{border-bottom:none}
.log-num{
  flex-shrink:0;
  width:18px;height:18px;border-radius:50%;
  background:#eaf0fb;color:#2980b9;
  font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  margin-top:1px;
}
.log-num.log-yes{background:#e8f8f0;color:#27ae60}
.log-num.log-no{background:#fdecea;color:#e74c3c}
.log-text{font-size:11px;color:var(--color-text-primary,#111);line-height:1.4;flex:1}
.log-ans{display:inline-block;font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;margin-top:2px}
.log-ans.yes{background:#e8f8f0;color:#27ae60}
.log-ans.no{background:#fdecea;color:#e74c3c}
.log-empty{padding:12px;font-size:11px;color:var(--color-text-secondary,#888);text-align:center}

/* stbl */
.stbl{width:100%;font-size:12px;margin-bottom:10px;border-collapse:collapse}
.stbl th{font-size:10px;color:var(--color-text-secondary,#888);padding:3px 6px;border-bottom:1px solid var(--color-border-tertiary,#e0e0e0);text-align:left}
.stbl td{padding:4px 6px;color:var(--color-text-primary,#111)}
.stbl td:last-child{text-align:right;font-weight:600}
</style>
</head><body>
<div id="finger-overlay">
  <div id="finger-bubble">これ！</div>
  <svg id="finger-svg" viewBox="0 0 52 62" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="18" cy="11" rx="7" ry="10" fill="white" stroke="#ddd" stroke-width="1.5"/>
    <ellipse cx="18" cy="5" rx="5" ry="3.5" fill="#f8d7da" stroke="#ddd" stroke-width="1"/>
    <ellipse cx="18" cy="3.5" rx="2.5" ry="1.5" fill="rgba(255,255,255,.7)"/>
    <ellipse cx="29" cy="19" rx="6" ry="8" fill="white" stroke="#ddd" stroke-width="1.5"/>
    <ellipse cx="38" cy="23" rx="5" ry="7" fill="white" stroke="#ddd" stroke-width="1.5"/>
    <ellipse cx="45" cy="27" rx="4" ry="5.5" fill="white" stroke="#ddd" stroke-width="1.5"/>
    <ellipse cx="8" cy="26" rx="6" ry="8" fill="white" stroke="#ddd" stroke-width="1.5" transform="rotate(-18,8,26)"/>
    <ellipse cx="27" cy="36" rx="17" ry="15" fill="white" stroke="#ddd" stroke-width="1.5"/>
    <rect x="13" y="46" width="26" height="14" rx="6" fill="white" stroke="#ddd" stroke-width="1.5"/>
    <path d="M13,48 Q26,53 39,48" fill="none" stroke="#eee" stroke-width="2"/>
    <line x1="24" y1="22" x2="26" y2="35" stroke="#eee" stroke-width="1.2"/>

  </svg>
</div>
<div id="root"></div>
<script>
function svgHouse(n,rc){rc=rc||'#7f8c8d';const w=n?'#fafafa':'#e8e8e8';return`<svg viewBox="0 0 60 56" xmlns="http://www.w3.org/2000/svg"><polygon points="5,28 30,4 55,28" fill="${rc}" stroke="#fff" stroke-width="1"/><rect x="10" y="27" width="40" height="26" fill="${w}" stroke="#fff" stroke-width="1"/><rect x="24" y="38" width="12" height="15" rx="1" fill="${rc}" opacity=".7"/><rect x="13" y="32" width="9" height="8" rx="1" fill="#aed6f1" stroke="#fff" stroke-width=".5"/><rect x="38" y="32" width="9" height="8" rx="1" fill="#aed6f1" stroke="#fff" stroke-width=".5"/>${n?'<circle cx="48" cy="10" r="5" fill="#f1c40f" opacity=".9"/>':''}</svg>`;}
function svgApt(n,rc){
  // 2階建てアパート: 三角屋根＋2フロア
  rc=rc||'#9e9e9e';const wall=n?'#fafafa':'#e8e8e8', roof=rc, trim=rc;
  return`<svg viewBox="0 0 60 56" xmlns="http://www.w3.org/2000/svg">
    <polygon points="10,28 18,16 42,16 50,28" fill="${roof}" stroke="#fff" stroke-width="1"/>
    <rect x="6" y="27" width="48" height="28" fill="${wall}" stroke="#fff" stroke-width="1"/>
    <line x1="6" y1="41" x2="54" y2="41" stroke="${trim}" stroke-width="1.5"/>
    <rect x="9" y="30" width="8" height="8" rx="1" fill="#aed6f1" stroke="#fff" stroke-width=".5"/>
    <rect x="22" y="30" width="8" height="8" rx="1" fill="#aed6f1" stroke="#fff" stroke-width=".5"/>
    <rect x="35" y="30" width="8" height="8" rx="1" fill="#aed6f1" stroke="#fff" stroke-width=".5"/>
    <rect x="48" y="30" width="6" height="8" rx="1" fill="#aed6f1" stroke="#fff" stroke-width=".5"/>
    <rect x="9" y="43" width="8" height="8" rx="1" fill="#aed6f1" stroke="#fff" stroke-width=".5"/>
    <rect x="22" y="43" width="8" height="8" rx="1" fill="#aed6f1" stroke="#fff" stroke-width=".5"/>
    <rect x="35" y="43" width="8" height="8" rx="1" fill="#aed6f1" stroke="#fff" stroke-width=".5"/>
    <rect x="48" y="43" width="6" height="8" rx="1" fill="#aed6f1" stroke="#fff" stroke-width=".5"/>
    <rect x="26" y="46" width="8" height="9" rx="1" fill="${trim}" opacity=".7"/>
    ${n?`<circle cx="50" cy="13" r="4" fill="#f1c40f" opacity=".9"/>`:''}
  </svg>`;
}
function svgMsn(n,rc){rc=rc||'#7f8c8d';const w=n?'#fafafa':'#e8e8e8';return`<svg viewBox="0 0 60 56" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="8" width="50" height="46" fill="${w}" stroke="#fff" stroke-width="1"/><rect x="5" y="8" width="50" height="8" fill="${rc}"/><rect x="22" y="40" width="16" height="14" rx="1" fill="${rc}" opacity=".7"/>${[0,1,2,3].map(c=>[0,1,2].map(r=>`<rect x="${8+c*13}" y="${19+r*9}" width="9" height="6" rx="1" fill="#aed6f1" stroke="#fff" stroke-width=".5"/>`).join('')).join('')}</svg>`;}

function svgSta(){return`<svg viewBox="0 0 60 56" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#bdc3c7"/><stop offset="100%" stop-color="#95a5a6"/></linearGradient></defs><rect x="2" y="8" width="56" height="44" rx="4" fill="url(#sg)" stroke="#7f8c8d" stroke-width="1"/><rect x="2" y="8" width="56" height="13" rx="4" fill="#7f8c8d"/><text x="30" y="19" text-anchor="middle" font-size="8.5" fill="#fff" font-weight="900" letter-spacing="1">STATION</text><rect x="8" y="25" width="13" height="11" rx="2" fill="#d6eaf8" stroke="#aed6f1" stroke-width=".8"/><rect x="24" y="25" width="12" height="11" rx="2" fill="#d6eaf8" stroke="#aed6f1" stroke-width=".8"/><rect x="39" y="25" width="13" height="11" rx="2" fill="#d6eaf8" stroke="#aed6f1" stroke-width=".8"/><rect x="22" y="36" width="16" height="16" rx="2" fill="#566573"/><rect x="28" y="40" width="4" height="6" rx="1" fill="#aab7b8" opacity=".7"/><rect x="2" y="50" width="56" height="4" rx="1" fill="#aab7b8" opacity=".6"/></svg>`;}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}

function mkCards(cols){
  const center=Math.floor(cols/2),pool=[];
  for(const c of COLORS)for(const ct of CTYPES)pool.push({id:`${c}_${ct.type}_${ct.age}_${Math.random()}`,type:ct.type,age:ct.age,short:ct.short,color:c,flipped:false,isD:ct.type==='一戸建て',isA:ct.type==='アパート',isM:ct.type==='マンション',isT:ct.type==='タワーマンション',isNew:ct.age==='新築',isOld:ct.age==='中古',isR:c==='赤',isBl:c==='青',isY:c==='黄',isG:c==='緑'});
  shuffle(pool);const grid=[];let pi=0;
  for(let i=0;i<cols*cols;i++){const row=Math.floor(i/cols),col=i%cols;if(row===center&&col===center)grid.push({id:'sta',isStation:true,row:center,col:center});else{const c=pool[pi++]||pool[0];grid.push({...c,id:c.id+'_'+i,row,col});}}
  return grid;
}
function cardAnswer(card,qid,center){
  if(!card||card.isStation)return false;
  switch(qid){
    case 'north':return card.row<=center;case 'south':return card.row>=center;case 'east':return card.col>=center;case 'west':return card.col<=center;
    case 'blue':return card.isBl;case 'red':return card.isR;case 'yellow':return card.isY;case 'new':return card.isNew;case 'old':return card.isOld;
    case 'farthest':{const d=Math.max(Math.abs(card.row-center),Math.abs(card.col-center));return d===center;}
    case 'dA':return card.isD||card.isA;case 'dM':return card.isD||card.isM;case 'dT':return card.isD||card.isT;case 'AM':return card.isA||card.isM;case 'AT':return card.isA||card.isT;default:return false;
  }
}

function cpuFingerAnimate(we,finalEl,stepMs,cb){hideFinger();let idx=0;function step(){if(idx>=we.length){if(finalEl){const r=finalEl.getBoundingClientRect();showFinger(r.left+r.width/2,r.top+r.height/2,false);fingerSVG.style.animation='fingerWobble 0.4s ease-in-out 2';}fingerTimer=setTimeout(()=>{if(finalEl){const r=finalEl.getBoundingClientRect();fingerClick(r.left+r.width/2,r.top+r.height/2,cb);}else{hideFinger();if(cb)cb();}},900);return;}const el=we[idx];if(el){const r=el.getBoundingClientRect();showFinger(r.left+r.width/2,r.top+r.height/2,true);}idx++;fingerTimer=setTimeout(step,stepMs);}step();}

function initGame(humans,mode,gameNum,totalScores){
  hideFinger();
  const m=MODES[mode],players=[];
  const gn=gameNum||1;
  // 先手ローテーション: 1ゲーム目→P1(あなた), 2ゲーム目→CPU2, 3ゲーム目→CPU3, 4ゲーム目→CPU4
  const firstPlayer=(gn-1)%4; // 0=P1/あなた, 1=CPU2, 2=CPU3, 3=CPU4
  // scoreは4ゲーム通しで引き継ぐ（リセットしない）
  for(let i=0;i<4;i++){const h=i<humans;players.push({name:h?`P${i+1}`:`CPU${i+1}`,cpu:!h,score:totalScores?totalScores[i]||0:0,avatarColor:AVATAR_COLORS[i]});}
  const center=Math.floor(m.cols/2),cards=mkCards(m.cols);
  const nonSta=cards.filter(c=>c&&!c.isStation);
  const target=nonSta[0|Math.random()*nonSta.length];
  const baseQ=mode==='easy'?QCARDS.filter(q=>q.id!=='farthest'):QCARDS;G={phase:'play',players,humans,cards,target,qcards:shuffle([...baseQ]).slice(0,m.qCount),mode,modeConf:m,center,revealedQs:[],currentQ:-1,currentPlayer:firstPlayer,waitingReveal:false,log:[],pendingQIdx:-1,pendingAns:null,gameNum:gn};
  render();

}

function doReveal(idx){
  const card=G.cards[idx];if(!card||card.isStation||card.flipped)return;
  card.flipped=true;const isHit=card.id===G.target.id;
  const cp=G.players[G.currentPlayer],pts=G.qcards.length-G.revealedQs.length+1;
  G.waitingReveal=false;
  if(isHit){cp.score+=pts;playCorrect();}
  render();
  requestAnimationFrame(()=>{
    if(isHit){
      const tn=`${G.target.color}・${G.target.type}(${G.target.age})`;

        `<strong>${dispName(cp)}</strong>が「${tn}」を発見！<br><span style="font-size:16px;font-weight:700;color:#27ae60;">+${pts}点</span>`,
        btnLabel,`clearPP();nextGame()`));
    } else {
      if(G.revealedQs.length>=G.qcards.length){endGame();}
      else {
        playWrong();showPopup(sp(clientIcon(),`${clientName()}「ちがいますねえ…」`,
          `<strong>${dispName(cp)}</strong>は外れました`,
          '次へ',`clearPP();nextPlayer()`));
      }
    }
  });
}

function cpuTurn(){
  if(G.phase!=='play')return;

function cpuDoTurn(){
  if(G.phase!=='play')return;
  const cp=G.players[G.currentPlayer];if(!cp.cpu)return;
  const available=[...Array(G.qcards.length).keys()].filter(i=>!G.revealedQs.includes(i));
  if(!available.length){endGame();return;}
  const avEls=available.map(i=>document.querySelector(`[data-qi="${i}"]`)).filter(Boolean);
  const chosenIdx=available[0|Math.random()*available.length];
  const finalEl=document.querySelector(`[data-qi="${chosenIdx}"]`);
  const wc=2+0|Math.random()*3,we=[];for(let w=0;w<wc;w++)we.push(avEls[0|Math.random()*avEls.length]);
  cpuFingerAnimate(we,finalEl||we[0],wc*480,()=>{
    G.pendingQIdx=chosenIdx;G.pendingAns=cardAnswer(G.target,G.qcards[chosenIdx].id,G.center);
    hideFinger();playFlip();render();// カードを表向きにする
    const q=G.qcards[chosenIdx],pts=G.qcards.length-G.revealedQs.length;
    requestAnimationFrame(()=>showPopup(buildStep1Html(dispName(cp),q.q,q.note,pts,'cpuStep2')));
  });
}

  const cp=G.players[G.currentPlayer],q=G.qcards[G.pendingQIdx];

  addLog({q:q.q,ans:G.pendingAns,who:dispName(cp),num:G.revealedQs.length});
  G.waitingReveal=true;
  render();
  // ボタンが押されたらcpuPickCardへ（自動実行しない）
  requestAnimationFrame(()=>{
    showPopup(sp(playerIcon(G.currentPlayer),`${dispName(cp)}が物件を推理中…`,'',`次へ（${dispName(cp)}が選ぶ）`,'clearPP();cpuPickCard()'));
  });
}
function cpuPickCard(){
  let cands=G.cards.filter(c=>c&&!c.isStation&&!c.flipped);
  for(const ri of G.revealedQs){const a=cardAnswer(G.target,G.qcards[ri].id,G.center);cands=cands.filter(c=>cardAnswer(c,G.qcards[ri].id,G.center)===a);}
  if(!cands.length)cands=G.cards.filter(c=>c&&!c.isStation&&!c.flipped);
  const pick=cands[0|Math.random()*cands.length];if(!pick){nextPlayer();return;}
  const pickIdx=G.cards.findIndex(c=>c&&c.id===pick.id);
  const candEls=cands.slice(0,5).map(c=>{const ci=G.cards.findIndex(x=>x&&x.id===c.id);return document.querySelector(`[data-cidx="${ci}"]`);}).filter(Boolean);
  const finalEl=document.querySelector(`[data-cidx="${pickIdx}"]`);
  const wc=2+0|Math.random()*3,we=[];for(let w=0;w<wc;w++)we.push(candEls[0|Math.random()*candEls.length]);
  setTimeout(()=>cpuFingerAnimate(we,finalEl||we[0],wc*420,()=>{hideFinger();doReveal(pickIdx);}),300);
}
function endGame(){
  G.phase='end';G.cards.forEach(c=>{if(c&&!c.isStation)c.flipped=true;});render();
  const tn=`${G.target.color}・${G.target.type}(${G.target.age})`;
  const isLastGame=G.gameNum>=4;
  if(isLastGame){
    const sorted=[...G.players].map((p,i)=>({...p,origIdx:i})).sort((a,b)=>b.score-a.score);
    const rows=sorted.map((p,i)=>`<tr><td>${['🥇','🥈','🥉',''][i]||''}${dispName(p)}</td><td>${p.score}点</td></tr>`).join('');
    playFinale();setTimeout(()=>{showBd();const p=getPP();if(p){p.innerHTML=`<div class="conv-result"><div class="res-icon">🏆</div><div class="res-title">4ゲーム終了！総合結果</div><div class="res-body">最後は「${tn}」でした<br><br><table class="stbl"><tr><th>プレイヤー</th><th>合計点</th></tr>${rows}</table>総合優勝: <strong>${dispName(sorted[0])}</strong>（${sorted[0].score}点）</div><button class="btn btn-p" onclick="clearPP();G.phase='setup';render()">もう一度</button></div>`;requestAnimationFrame(()=>requestAnimationFrame(()=>p.classList.add('show')));}},400);
  } else {
    const nextFirst=G.gameNum%4;
    const nextNames=['あなた（P1）','CPU2','CPU3','CPU4'];
    setTimeout(()=>{showBd();const p=getPP();if(p){p.innerHTML=`<div class="conv-result"><div class="res-icon">🏁</div><div class="res-title">第${G.gameNum}ゲーム終了！</div><div class="res-body">「${tn}」でした<br><br>次は <strong>${nextNames[nextFirst]}</strong> が先手！</div><button class="btn btn-p" onclick="clearPP();nextGameContinue()">第${G.gameNum+1}ゲームへ</button></div>`;requestAnimationFrame(()=>requestAnimationFrame(()=>p.classList.add('show')));}},400);
  }
}
function nextGame(){
  const gn=G.gameNum;
  // scoreはリセットせずそのまま累計として使う
  if(gn>=4){
    const sorted=[...G.players].map((p,i)=>({...p,origIdx:i})).sort((a,b)=>b.score-a.score);
    const rows=sorted.map((p,i)=>`<tr><td>${['🥇','🥈','🥉',''][i]||''}${dispName(p)}</td><td>${p.score}点</td></tr>`).join('');
    G.phase='end';render();playFinale();
    setTimeout(()=>{showBd();const p=getPP();if(p){p.innerHTML=`<div class="conv-result"><div class="res-icon">🏆</div><div class="res-title">4ゲーム終了！総合結果</div><div class="res-body"><table class="stbl"><tr><th>プレイヤー</th><th>合計点</th></tr>${rows}</table>総合優勝: <strong>${dispName(sorted[0])}</strong>（${sorted[0].score}点）</div><button class="btn btn-p" onclick="clearPP();G.phase='setup';render()">もう一度</button></div>`;requestAnimationFrame(()=>requestAnimationFrame(()=>p.classList.add('show')));}},200);
  } else {
    const nextFirst=gn%4;
    const nextNames=['あなた（P1）','CPU2','CPU3','CPU4'];
    G.phase='end';render();playNextGame();
    setTimeout(()=>{showBd();const p=getPP();if(p){p.innerHTML=`<div class="conv-result"><div class="res-icon">🎊</div><div class="res-title">第${gn}ゲーム終了！</div><div class="res-body">次は <strong>${nextNames[nextFirst]}</strong> が先手！</div><button class="btn btn-p" onclick="clearPP();nextGameContinue()">第${gn+1}ゲームへ</button></div>`;requestAnimationFrame(()=>requestAnimationFrame(()=>p.classList.add('show')));}},200);
  }
}
function nextGameContinue(){
  const humans=G.humans,mode=G.mode,gn=G.gameNum;
  const scores=G.players.map(p=>p.score);  // 累計スコアをそのまま引き継ぐ
  initGame(humans,mode,gn+1,scores);
}

function makeScoreCard(){
  if(!G.players)return'';
  const rows=G.players.map((p,i)=>{
    const isCur=G.phase==='play'&&i===G.currentPlayer;
    const dn=dispName(p);
    const badge=p.cpu
      ?`<span class="score-badge" style="background:#e8eaff;color:#3c3489;">CPU</span>`
      :`<span class="score-badge" style="background:#e8f8e8;color:#0f6e56;">YOU</span>`;
    // p.scoreが4ゲーム通しの累計なのでそのまま表示（ゲーム番号表示は不要）
    const cumul='';
    return`<div class="score-row ${isCur?'current-player':''}">
      <div class="score-avatar" style="background:${p.avatarColor};">${dn.slice(0,1)}</div>
      <div class="score-name">${dn}${badge}</div>
      ${isCur?`<div class="cur-arrow">▶</div>`:''}
      <div class="score-pts">${p.score}<span style="font-size:10px;font-weight:400;color:#888;">点</span>${cumul}</div>
    </div>`;
  }).join('');
  return`<div class="score-card"><div class="score-card-header">🏆 スコア</div>${rows}</div>`;
}
function render(){
  const root=document.getElementById('root');if(!root)return;

  const cp=G.players[G.currentPlayer],m=G.modeConf;

  const qcards=G.qcards.map((q,i)=>{

      <div class="qcard-back ${isUsed?'used':''}" data-qi="${i}" onclick="${canFlip?`flipQuestion(${i})`:''}" style="${canFlip?'cursor:pointer':'cursor:default'}">
        <span class="qnum" style="font-size:${m.cols===7?7:8}px;">${i+1}</span>
        ${!isUsed?`<span class="qpts" style="font-size:${m.cols===7?7:8}px;">${pts}pt</span>`:''}
        <svg viewBox="0 0 44 52" width="${qsz*0.58}" height="${qsz*0.68}" xmlns="http://www.w3.org/2000/svg">

          <circle cx="18" cy="32" r="11" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="3.5"/>

        </svg>

      <div class="qcard-front" style="font-size:${m.cols===7?7:8}px;">

  }).join('');

  const boardCells=G.cards.map((c,i)=>{
    if(!c)return`<div class="oc" style="width:${cs}px;height:${cs}px;"></div>`;
    const imgH=cs-26;
    if(c.isStation)return`<div class="oc sta-card" style="width:${cs}px;height:${cs}px;"><div class="card-img" style="height:${imgH}px;">${svgSta()}</div></div>`;
    const isTarget=G.target&&c.id===G.target.id;
    const canClick=G.waitingReveal&&!G.players[G.currentPlayer].cpu&&!c.flipped;
    let cls='oc '+colCls(c)+(c.isOld?' old-card':'');
    if(c.flipped&&isTarget)cls+=' found';else if(c.flipped)cls+=' miss';
    const ageLabel=c.isNew?`<span class="oa" style="font-size:${fs.age}px;background:#e74c3c;color:#fff;">新築</span>`:`<span class="oa" style="font-size:${fs.age}px;background:#7f8c8d;color:#fff;">中古</span>`;
    return`<div class="${cls}" data-cidx="${i}" style="width:${cs}px;height:${cs}px;${canClick?'cursor:pointer':''}" onmouseenter="${canClick?`this.classList.add('hovering-card')`:''}" onmouseleave="${canClick?`this.classList.remove('hovering-card')`:''}" onclick="${canClick?`onCardClick(${i})`:''}" >
      <div class="card-img" style="height:${imgH}px;">${getCardSVG(c)}</div>
      ${c.flipped?`<div class="result-overlay" style="font-size:${fs.icon}px;">${isTarget?'✅':'❌'}</div>`:''}
      <span class="ot" style="font-size:${fs.type}px;">${c.short}</span>${ageLabel}
    </div>`;
  }).join('');

  // ── あなたの番カード ──
  let turnHeader='',turnBody='';
  if(G.waitingReveal&&!cp.cpu){
    turnHeader=`<div class="turn-card-header" style="background:${m.turnBg};">🏠 物件を選んでください</div>`;
    turnBody=`<div class="turn-card-body">盤面の物件をクリックして当てよう！<br>正解すると <strong>${pts+1}点</strong></div>`;
  } else if(G.waitingReveal&&cp.cpu){
    turnHeader=`<div class="turn-card-header" style="background:linear-gradient(90deg,#636e72,#b2bec3);">🤖 ${dispName(cp)}が推理中</div>`;
    turnBody=`<div class="turn-card-body">CPUが物件を選んでいます…</div>`;
  } else if(!cp.cpu){
    turnHeader=`<div class="turn-card-header" style="background:${m.turnBg};">🃏 あなたの番</div>`;
    turnBody=`<div class="turn-card-body">裏向きの質問カードをクリックしてめくろう</div>`;
  } else {
    turnHeader=`<div class="turn-card-header" style="background:linear-gradient(90deg,#636e72,#b2bec3);">🤖 ${dispName(cp)}の番</div>`;
    turnBody=`<div class="turn-card-body">CPUが質問カードを選んでいます…</div>`;
  }
  const turnCard=`<div class="turn-card">${turnHeader}${turnBody}</div>`;

  // ── ログカード ──
  let logItems='';
  if(G.log.length===0){
    logItems=`<div class="log-empty">まだ質問はありません</div>`;
  } else {
    logItems=G.log.map(entry=>{
      const cls=entry.ans?'log-yes':'log-no';
      const ansTxt=entry.ans?'そうですよ':'ちがいますよ';
      return`<div class="log-item">
        <div class="log-num ${cls}">${entry.num}</div>
        <div class="log-text">
          <span style="font-size:10px;color:#888;">${entry.who}</span><br>
          ${entry.q}<br>
          <span class="log-ans ${entry.ans?'yes':'no'}">→ ${ansTxt}</span>
        </div>
      </div>`;
    }).join('');
  }
  const logCard=`<div class="log-card">
    <div class="log-card-header">📋 質問ログ</div>
    <div class="log-list">${logItems}</div>
  </div>`;

  root.innerHTML=`
    <div class="banner ${m.bannerCls}">${m.icon} 第${G.gameNum}/4ゲーム | ${m.label} — 質問 ${usedCount}/${G.qcards.length} | <strong>${dispName(cp)}</strong>の番 | 当てると <strong>${pts>0?pts+1:1}点</strong></div>
    <div class="qcard-section-title">🔍 お客さんへの質問カード</div>
    <div class="qcard-area">${qcards}</div>
    <div class="glayout">
      <div class="board-compass-wrap">
        <div class="compass-row-top"><div class="dir-label">北</div></div>
        <div class="compass-row-mid">
          <div class="dir-side" style="height:${boardH}px;"><div class="dir-label">西</div></div>
          <div class="board-area">
            <div class="board" style="grid-template-columns:repeat(${m.cols},${cs}px);">${boardCells}</div>
            <div id="board-backdrop" class="board-backdrop"></div>
            <div id="conv-popup" class="conv-popup"></div>
          </div>
          <div class="dir-side" style="height:${boardH}px;"><div class="dir-label">東</div></div>
        </div>
        <div class="compass-row-bot"><div class="dir-label">南</div></div>
      </div>
      <div class="side">
        ${turnCard}
        ${makeScoreCard()}
        ${logCard}
      </div>
    </div>`;
}

function buildSetup(){
  const modeCards=Object.entries(MODES).map(([key,m])=>`<div class="sel-card sel-${key} ${SS.mode===key?'chosen':''}" onclick="SS.mode='${key}';render()"><span class="sc-icon">${m.icon}</span><div class="sc-title">${m.label}</div><div class="sc-desc">${m.desc}<br>質問 ${m.qCount}枚</div></div>`).join('');
  const pCards=PLAYER_OPTS.map(o=>`<div class="sel-card ${o.cls} ${SS.humans===o.n?'chosen':''}" onclick="SS.humans=${o.n};render()"><span class="sc-icon">${o.icon}</span><div class="sc-title">${o.label}</div><div class="sc-desc">${o.desc}</div></div>`).join('');
  const m=MODES[SS.mode];
  return`<div class="setup">
    <div style="background:linear-gradient(135deg,#ff7c00,#e85d00);padding:32px 28px 24px;text-align:center;">
      <div style="margin-bottom:12px;width:100%;max-width:300px;margin-left:auto;margin-right:auto;">
        <svg viewBox="0 0 340 68" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="4" width="340" height="56" rx="12" fill="rgba(0,0,0,0.15)"/>
          <rect x="2" y="6" width="336" height="52" rx="10" fill="rgba(255,255,255,0.12)"/>
          <circle cx="28" cy="32" r="12" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="3.5"/>
          <circle cx="28" cy="32" r="7" fill="rgba(255,255,255,0.18)"/>
          <line x1="37" y1="41" x2="47" y2="51" stroke="rgba(255,255,255,0.95)" stroke-width="4" stroke-linecap="round"/>
          <circle cx="23" cy="27" r="3.5" fill="rgba(255,255,255,0.35)"/>
          <polygon points="298,42 312,26 326,42" fill="white"/>
          <rect x="301" y="41" width="22" height="14" fill="white" opacity="0.85"/>
          <rect x="308" y="45" width="7" height="10" rx="1" fill="rgba(255,124,0,0.8)"/>
          <text x="170" y="30" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="22" font-weight="900" fill="white" letter-spacing="3">Homes Homes</text>
          <text x="170" y="50" text-anchor="middle" font-family="'Hiragino Maru Gothic Pro',sans-serif" font-size="11" fill="rgba(255,255,255,0.88)" letter-spacing="1">〜理想のおうちお探しします！〜</text>
        </svg>
      </div>
      <p style="color:rgba(255,255,255,0.88);font-size:12px;line-height:1.7;margin:0;">4人の不動産屋が質問カードを使ってお客さんの理想の物件を当てるゲーム<br>4ゲームの合計点で総合優勝を決めよう！</p>
    </div>
    <div class="sc">
      <div class="sc-label">🎮 モードを選択</div>
      <div class="select-cards">${modeCards}</div>
    </div>
    <div class="sc">
      <div class="sc-label">👤 プレイヤー人数</div>
      <div class="select-cards">${pCards}</div>
    </div>
    <div class="sc" style="text-align:center;padding:28px;">
      <button class="btn btn-p" style="background:linear-gradient(135deg,${m.color},${m.color}cc);border:none;font-size:15px;font-weight:800;padding:14px 0;width:300px;border-radius:50px;box-shadow:0 4px 16px ${m.color}66;letter-spacing:1px;transition:all .2s;" onclick="initGame(SS.humans,SS.mode)">${m.icon} ${m.label}・${SS.humans}人でスタート！</button>
    </div>
    <div class="sc" style="background:#fafafa;">
      <div class="sc-label">📖 遊び方</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:12px;">

        <div style="background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);">🏠 ヒントをもとに<strong>物件を当てる</strong></div>
        <div style="background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);">⭐ 早く当てるほど<strong>高得点</strong></div>
        <div style="background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);">🏆 4ゲームの<strong>合計点</strong>で勝負！</div>
      </div>
    </div>
  </div>`;
}

G.phase='setup';render();
// ══ 効果音（Web Audio API） ══
const _ac=new(window.AudioContext||window.webkitAudioContext)();
function _resume(){if(_ac.state==='suspended')_ac.resume();}

function playCorrect(){
  _resume();
  // ファンファーレ: ド→ミ→ソ→高ド の上昇アルペジオ
  [[0,261],[0.1,329],[0.2,392],[0.3,523],[0.35,659],[0.45,523],[0.5,659],[0.55,784]].forEach(([t,f])=>{
    const o=_ac.createOscillator(),g=_ac.createGain();
    o.connect(g);g.connect(_ac.destination);
    o.type='square';o.frequency.value=f;
    g.gain.setValueAtTime(0,_ac.currentTime+t);
    g.gain.linearRampToValueAtTime(0.18,_ac.currentTime+t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,_ac.currentTime+t+0.18);
    o.start(_ac.currentTime+t);o.stop(_ac.currentTime+t+0.2);
  });
}

function playWrong(){
  _resume();
  // 残念音: 高→低 の下降2音
  [[0,320],[0.15,220]].forEach(([t,f])=>{
    const o=_ac.createOscillator(),g=_ac.createGain();
    o.connect(g);g.connect(_ac.destination);
    o.type='sawtooth';o.frequency.value=f;
    g.gain.setValueAtTime(0.15,_ac.currentTime+t);
    g.gain.exponentialRampToValueAtTime(0.001,_ac.currentTime+t+0.25);
    o.start(_ac.currentTime+t);o.stop(_ac.currentTime+t+0.28);
  });
}

function playFlip(){
  _resume();
  // カードめくり: 軽いポコッ
  const o=_ac.createOscillator(),g=_ac.createGain();
  o.connect(g);g.connect(_ac.destination);
  o.type='sine';
  o.frequency.setValueAtTime(600,_ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(300,_ac.currentTime+0.08);
  g.gain.setValueAtTime(0.2,_ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,_ac.currentTime+0.12);
  o.start();o.stop(_ac.currentTime+0.13);
}

function playTurn(){
  _resume();
  // ターン開始: ポン！
  const o=_ac.createOscillator(),g=_ac.createGain();
  o.connect(g);g.connect(_ac.destination);
  o.type='sine';o.frequency.value=440;
  g.gain.setValueAtTime(0.15,_ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,_ac.currentTime+0.15);
  o.start();o.stop(_ac.currentTime+0.16);
}

function playFinale(){
  _resume();
  // 総合結果: 華やかなジングル
  [[0,523],[0.1,659],[0.2,784],[0.3,1047],[0.45,784],[0.5,880],[0.6,1047],[0.7,1319]].forEach(([t,f])=>{
    const o=_ac.createOscillator(),g=_ac.createGain();
    o.connect(g);g.connect(_ac.destination);
    o.type='triangle';o.frequency.value=f;
    g.gain.setValueAtTime(0,_ac.currentTime+t);
    g.gain.linearRampToValueAtTime(0.2,_ac.currentTime+t+0.03);
    g.gain.exponentialRampToValueAtTime(0.001,_ac.currentTime+t+0.25);
    o.start(_ac.currentTime+t);o.stop(_ac.currentTime+t+0.28);
  });
}

function playNextGame(){
  _resume();
  // 次のゲームへ: 軽快な2音
  [[0,440],[0.12,554]].forEach(([t,f])=>{
    const o=_ac.createOscillator(),g=_ac.createGain();
    o.connect(g);g.connect(_ac.destination);
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0.15,_ac.currentTime+t);
    g.gain.exponentialRampToValueAtTime(0.001,_ac.currentTime+t+0.18);
    o.start(_ac.currentTime+t);o.stop(_ac.currentTime+t+0.2);
  });
}
